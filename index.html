тавишь уже нормально, но модель отрезана от того, с чем ты реально работаешь: файлы, таблицы, почта, календарь, переписка с клиентами.", "пока она про них не знает, ты работаешь переносчиком — копируешь туда, копируешь обратно, и половина выигрыша уходит на эту беготню.", "здесь заканчивается чат и начинается агент: коннекторы, MCP, доступ к твоим системам. это и есть та граница, за которой ИИ перестает быть собеседником →"], ["твой разрыв — в том, что ты пока ничего не собрал.", "все, что ты умеешь, живет внутри диалогов и исчезает вместе с ними.", "первая собранная вещь — страница, бот, маленький инструмент под твою задачу — меняет отношение к ИИ сильнее, чем еще сто разговоров. и дело даже не в том, полезной она выйдет или нет.", "я собрала свою первую рабочую вещь, не умея писать код, и после нее ушел не столько страх, сколько убеждение, что для этого нужно кем-то быть →"], ["твой разрыв — в применении.", "технически ты умеешь почти все, но ИИ у тебя обслуживает разовые задачи, а не то, что повторяется каждую неделю.", "передача — это другое действие, чем помощь. помощь ты запрашиваешь каждый раз заново, передачу описываешь один раз: шаги, условия, что считается сделанным.", "возьми один повтор, который делаешь по одному и тому же сценарию не первый месяц, и отдай его целиком →"]], "mats": [{"name": "формула запроса: роль, контекст, задача, тон, критика.", "gives": "чинит слабые ответы за один вечер. просить 15 вариантов вместо 5 — правило оттуда же.", "prompt": "ты — [кто нужен: редактор рассылок / копирайтер лендингов / сценарист коротких видео] с опытом в [твоя ниша].\n\nконтекст. я делаю [что за проект, для кого, чем он отличается от соседей]. аудитория — [кто эти люди, что у них болит, каким языком они об этом говорят]. площадка — [телеграм / инстаграм / сайт / рассылка].\n\nзадача. напиши [что именно: 15 заголовков к посту про X / текст на 200 слов / три варианта первого абзаца]. ровно 15 вариантов, не меньше. каждый — не длиннее одной строки.\n\nтон. [как у меня в жизни: спокойно, без восклицаний, без обещаний «изменит вашу жизнь»]. не используй слова: [список того, что бесит].\n\nформат ответа. пронумерованный список. после списка — таблица из трёх колонок: номер, за счёт чего цепляет, кому не зайдёт.\n\nперед тем как писать, задай мне до пяти уточняющих вопросов, без ответов на которые получится вода. дождись ответов, потом работай.\n\nв конце разбери свои же варианты: три самых слабых и почему. предложи им замену.", "apply": "вставь в новый чат ChatGPT или Claude, заполни квадратные скобки своими словами — коряво, но честно. ответь на уточняющие вопросы, забери список, а дальше правь уже готовое, а не пустой лист."}, {"name": "три тарифа, где самый дорогой — приманка.", "gives": "собирается за 20 минут, меняет то, как выглядит твоя средняя цена.", "prompt": "ты — продуктовый маркетолог, который собирает линейки тарифов для маленьких проектов и частной практики.\n\nконтекст. я продаю [что именно ты продаёшь: консультации / курс / услугу под ключ]. сейчас у меня [одна цена или что есть] — [сумма и за что]. клиенты — [кто они, за что платят на самом деле]. я не готов опускаться ниже [минимальная сумма].\n\nзадача. собери три тарифа так, чтобы средний выглядел очевидным выбором: базовый — минимум, за который не стыдно; средний — тот, который я хочу продавать; верхний — дорогой якорь, который делает средний разумным. верхний должен быть реальным, а не выдуманным: я должен суметь его выполнить.\n\nформат ответа. таблица из пяти колонок: название тарифа, цена, что входит, для кого, чего специально нет. под таблицей — три строки: чем средний отличается от базового так, что разница чувствуется; почему верхний оправдывает свою цену; какая фраза на созвоне подталкивает к среднему.\n\nсначала задай мне восемь вопросов про клиентов, мою нагрузку и то, что я делаю бесплатно. потом собирай.", "apply": "подставь свои цены и то, что уже отдаёшь бесплатно — обычно именно оно и становится базовым тарифом. готовую таблицу проверь на себе: если верхний тариф тебе страшно назвать вслух, он подобран верно."}, {"name": "пять фреймворков одной строкой: PEST, пять почему, путь клиента, точки роста, быстрая проверка идеи.", "gives": "каждый — один запрос. на всё про всё вечер.", "prompt": "1) PEST. разбери рынок [твоя ниша, страна, год] по PEST: политика, экономика, общество, технологии. по четыре фактора в каждом блоке, каждый — с пометкой, играет он за меня или против. в конце таблица из трёх колонок: фактор, влияние на мой проект, что я могу сделать уже сейчас.\n\n2) пять почему. у меня проблема: [опиши в двух предложениях, как есть]. задай мне «почему» пять раз подряд, по одному вопросу за сообщение, каждый следующий — из моего ответа. дождись ответа, не забегай вперёд. после пятого назови настоящую причину и три способа её убрать.\n\n3) путь клиента. опиши путь моего клиента [кто он] от момента, когда он ещё не понимает, что у него проблема, до повторной покупки. семь шагов. для каждого: что он думает, где ищет, что его останавливает, что я делаю на этом шаге сейчас и чего не делаю.\n\n4) точки роста. вот мои цифры за последние месяцы: [вставь сюда что есть — выручка, заявки, подписчики]. найди пять мест, где небольшое изменение даёт заметный прирост. отсортируй по соотношению «усилие / эффект».\n\n5) быстрая проверка идеи. идея: [опиши в трёх предложениях]. разнеси её как скептик: пятнадцать причин, почему не взлетит. потом отбери три самые опасные и предложи, как проверить каждую за неделю и без бюджета.", "apply": "по одному запросу за вечер, в отдельных чатах, чтобы ответы не путались. подставляй свои цифры и формулировки — на общих словах все пять фреймворков выдают одинаковую воду."}, {"name": "заметки со встречи или подкаста → план на семь дней.", "gives": "10 минут. вместо папки с записями, к которым не возвращаются.", "prompt": "ты — начальник штаба, который превращает разговоры в дела и не даёт задачам расползаться.\n\nвот сырьё: [вставь сюда расшифровку встречи, свои заметки или консп удио.", "gives": "наговорил, как делаешь — получил документ, по которому сделает другой.", "prompt": "ты — методолог, который превращает устный рассказ practicioner-а в рабочий регламент для нового сотрудника.\n\nниже расшифровка аудио, где я вслух рассказываю, как делаю процесс [название процесса] в [твоя ниша]:\n\n[вставь сюда расшифровку своего аудио]\n\nсначала задай мне не больше семи уточняющих вопросов ровно по тем местам, где я перескочил, сказал «ну там понятно» или не назвал инструмент, срок и ответственного. вопросы задай списком, дождись моих ответов и только потом пиши документ.\n\nпосле ответов собери регламент такой структуры:\n1. цель процесса и результат на выходе — не больше трёх строк\n2. кто участвует и кто принимает решение\n3. что нужно иметь на старте: доступы, файлы, инструменты\n4. пошаговая процедура — каждый шаг одним глаголом в начале, с указанием, где это делается и сколько занимает\n5. точки контроля: что проверить, чтобы понять, что шаг сделан верно\n6. типичные ошибки и что делать, если пошло не так — минимум 5 пунктов\n7. чек-лист на одну страницу для быстрой сверки\n\nпиши так, чтобы человек, который видит процесс впервые, прошёл его без меня. без общих слов вроде «качественно» и «своевременно» — только проверяемые формулировки. объём — до 900 слов.", "apply": "наговори процесс на диктофон, прогони через любую расшифровку и вставь текст в квадратные скобки. ответь на уточняющие вопросы — без них выйдет пересказ, а не регламент; готовый документ отдай тому, кто будет делать, и правь по его вопросам."}, {"name": "премортем: запуск уже провалился, объясни как именно.", "gives": "40 минут. находит то допущение, в которое ты поверил и не проверил.", "prompt": "ты — консультант, который ведёт премортем: мы представляем, что запуск уже случился и полностью провалился, и разбираем причины задним числом.\n\nмой запуск: [что запускаешь, для кого, когда, на какие деньги].\nкак я считаю, что всё сработает: [опиши свою логику в 5–10 строках].\n\ исок сервисов, примерную стоимость в месяц, время на сборку в часах и главный минус. в конце явно скажи, какой вариант брать новичку и почему.\n\nшаг 3. запрос дословно:\nведи меня по выбранному варианту шагами. один шаг — одно действие. после каждого шага останавливайся и жди, пока я напишу «готово» или пришлю ошибку. код давай целыми файлами, а не кусками, и объясняй одной строкой, что делает каждый файл.\n\nшаг 4. запрос дословно:\nбот работает. дай чек-лист из 10 пунктов, что проверить перед тем, как я начну им пользоваться всерьёз, и что делать, если он молча перестанет отвечать.", "apply": "гони шаги по очереди в одном чате, не сваливай всё сразу — модель должна помнить тз. на третьем шаге не иди дальше, пока предыдущий шаг реально не заработал, иначе ошибки склеятся в одну кучу."}, {"name": "цифровой ментор на книге или тридцати интервью человека, которого ты слушаешь.", "gives": "пара вечеров. отвечает его логикой, а не общими словами.", "prompt": "шаг 1. запрос дословно:\nвот материалы одного человека — [книга / расшифровки интервью / посты]: [вставь сюда тексты, лучше 30–50 тысяч слов]. вытащи из них его модель мышления: 10 повторяющихся принципов, 7 вопросов, которые он задаёт первым делом, 5 вещей, которые он считает ошибкой, и его типичный ход рассуждения от проблемы к решению. цитируй его формулировками, а не пересказывай своими.\n\nшаг 2. запрос дословно:\nсобери из этого системный промпт для роли «ментор». опиши: кто он, как рассуждает, какие вопросы задаёт до совета, что не советует никогда, каким тоном говорит. отдельно пропиши правило: если данных в материалах нет, честно сказать «он про это не говорил» и не выдумывать за него.\n\nшаг 3. запрос дословно:\n[вставь системный промпт из шага 2]. теперь работай как этот ментор. моя ситуация: [твой вопрос]. сначала задай мне те уточняющие вопросы, которые задал бы он, — не больше пяти. потом разбери мою ситуацию его логикой и в конце покажи, на каком именно принципе из его материалов держится совет.\n\n function render(){
  if (i < 0) return intro();
  if (i >= Q.length) return final();
  const q = Q[i], cur = ans[i];
  let body = '<h2>' + esc(q.t) + '</h2>';
  if (q.hint) body += '<p class="hint">' + esc(q.hint) + '</p>';

  if (q.type === 'text'){
    body += '<textarea id="ta" placeholder="в двух словах, своими словами">' +
      esc(cur || '') + '</textarea>';
    screen.innerHTML = body;
    document.getElementById('ta').oninput = e => { ans[i] = e.target.value; navBtns(); };
  } else {
    const multi = q.type === 'multi';
    const chosen = multi ? (cur || []) : (cur === undefined ? [] : [cur]);
    const full = multi && q.max && chosen.length >= q.max;
    const opts = q.o.map((o,k) => {
      const on = chosen.includes(k);
      const off = full && !on;
      let pre = '';
      if (q.groups){ const g = q.groups.find(g => g[0] === k); if (g) pre = '<div class="grp">' + g[1] + '</div>'; }
      return pre + '<button class="opt' + (multi ? '' : ' radio') + (on ? ' on' : '') +
        (off ? ' off' : '') + '" data-k="' + k + '">' +
        '<span class="box">' + (multi ? '✓' : '●') + '</span><span>' + esc(o) + '</span></button>';
    }).join('');
    body += '<div class="opts">' + opts + '</div>';
    if (q.other) body += '<input class="other" id="oth" placeholder="свой вариант" value="' +
      esc(ans['oth' + i] || '') + '">';
    screen.innerHTML = body;
    screen.querySelectorAll('.opt').forEach(b => b.onclick = () => {
      const k = +b.dataset.k;
      if (multi){
        let arr = (ans[i] || []).slice();
        const p = arr.indexOf(k);
        if (p >= 0) arr.splice(p,1);
        else {
          if (q.reset !== undefined){
            if (k === q.reset) arr = [];
            else arr = arr.filter(x => x !== q.reset);
          }
          if (q.max && arr.length >= q.max) return;
          arr.push(k);
        }
        ans[i] = arr;
      } else ans[i] = k;
      render();
    });
    const oth = document.getElementById('oth');
    if (oth) oth.oninput = e => { ans['oth' + i] = e.target.value; };

  head();
  window.scrollTo(0,0);

function navBtns(){
  const q = Q[i];

  const ok = q.skip || (a !== undefined && (!Array.isArray(a) || a.length));
  nav.innerHTML =
    (i > 0 ? '<button class="btn ghost" id="back">←</button>' : '') +
    '<button class="btn grow" id="next"' + (ok ? '' : ' disabled') + '>' +
    (q.skip && !a ? 'пропустить' : 'дальше') + ' <span class="go">→</span></button>';
  const b = document.getElementById('back');
  if (b) b.onclick = () => { i--; render(); };
  document.getElementById('next').onclick = () => { if (ok){ i++; render(); } };
}

/* ---------- scoring ---------- */
function stepIndex(){ const v = ans[0]; return v <= 1 ? 0 : (v <= 3 ? 1 : 2); }

function gapIndex(){
  const done = ans[2] || [];
  const filled = AXMAP.map(g => g.some(k => done.includes(k)));
  for (let k = 0; k < 5; k++) if (!filled[k]) return k;
  return 4;
}

function taskIndex(){
  const day = ans[9];
  const goals = ans[4] || [];
  if (goals.includes(5)) return 4;            // «создать своё» перебивает — это продукт
  return day === undefined ? 3 : TASK[day];
}

function matIndex(){ return gapIndex() * 7 + taskIndex(); }

function showAccess(){

  if (showAccess())
    h += '<div class="sect"><div class="card"><p>' +
      X.acc.replace('гайд «Точка входа» →', '<a class="link" href="' + GUIDE +
      '" target="_blank">гайд «Точка входа» →</a>') + '</p></div></div>';

  h += '<hr><div class="sect fin">' + X.fin.map(p => '<p>' + p + '</p>').join('') + '</div>';

  screen.innerHTML = h;
  nav.innerHTML = '<a class="btn sky block" href="' + CHANNEL + '" target="_blank">' +
    'подписаться на канал <span class="go">→</span></a>' +
    (stepIndex() === 2 ? '<a class="btn ghost block" href="' + CONSULT + '" target="_blank" ' +
      'style="margin-top:10px">разобрать мой случай на консультации</a>' : '');

  const cp = document.getElementById('cp');
  cp.onclick = () => {
    navigator.clipboard.writeText(mat.prompt).then(() => {
      cp.textContent = 'скопировано ✓'; cp.classList.add('ok');
      setTimeout(() => { cp.textContent = 'скопировать промпт'; cp.classList.remove('ok'); }, 2200);
    });
  };
  window.scrollTo(0,0);
  send();
}

/* ---------- payload: одна плоская строка, версионированная ---------- */
function row(){
  const label = (n, v) => v === undefined ? '' :
    (Array.isArray(v) ? v.map(k => Q[n].o[k]).join(' | ') :
     (typeof v === 'number' ? Q[n].o[v] : v));
  const r = {
    version: VERSION,
    started_at: started,
    finished_at: new Date().toISOString(),
    step: ['наблюдатель','пользователь-новичок','практик-исследователь'][stepIndex()],
    gap: AX[gapIndex()],
    task: TASKNAME[taskIndex()],
    material: 'mat_' + String(matIndex() + 1).padStart(2,'0'),
    material_name: X.mats[matIndex()].name,
    access_shown: showAccess() ? 'да' : 'нет'
  };
  Q.forEach((q, n) => {
    r['q' + (n+1)] = label(n, ans[n]);
    if (q.other) r['q' + (n+1) + '_other'] = ans['oth' + n] || '';
  });
  return r;
}

function send(){
  const payload = row();
  window.__payload = payload;
  if (!ENDPOINT){ console.log('payload (endpoint не подключён):', payload); return; }
  fetch(ENDPOINT, {method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)}).catch(e => console.warn('отправка не прошла', e));
}

intro();
</script>
